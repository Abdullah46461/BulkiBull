services:
  db:
    image: postgres:16-alpine
    container_name: bulki-bull-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bulki_bull
      POSTGRES_USER: bulki
      POSTGRES_PASSWORD: bulki
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bulki -d bulki_bull']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
